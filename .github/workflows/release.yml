name: Release

# Tag a release to publish: `git tag vX.Y.Z && git push --tags`.
on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  npm:
    name: Publish package to npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - run: bun install --frozen-lockfile
      - name: Gate
        run: bun run check && bun --filter fluxgram test
      - name: Build
        run: bun run build
      - name: Authenticate to npm
        run: echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Publish fluxgram
        working-directory: packages/fluxgram
        run: bun publish --access public
