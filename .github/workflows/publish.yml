name: Publish

# Tag a release to publish: `git tag vX.Y.Z && git push --tags`.
on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  id-token: write

jobs:
  npm:
    name: Publish package to npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - run: bun install --frozen-lockfile
      - name: Build
        run: bun run build
      - name: Gate
        run: bun run check && bun --filter fluxgram test
      - name: Publish fluxgram
        working-directory: packages/fluxgram
        run: npm publish --access public
